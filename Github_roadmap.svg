<svg width="900" height="780" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="780" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">Research Roadmap — The Genetic Trap: mcr-1 Stabilization in French Bovine E. coli</text>

  <!-- ── Phase 0: Completed ── -->
  <rect x="40" y="58" width="820" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#8b949e">Phase 0 — Completed</text>
  <text x="450" y="99" text-anchor="middle" font-size="11" fill="#6e7681">RESAPATH longitudinal analysis · ALEA exposure analysis · Structural break (2017) · LMBK genomic proof-of-concept</text>

  <!-- Arrow 0→1 -->
  <line x1="450" y1="110" x2="450" y2="134" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 1: Screening ── -->
  <!-- Header -->
  <rect x="40" y="134" width="820" height="36" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="450" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">WP1 · Phase 1 — Initial Screening  ·  PRJNA1166088 (127 isolates)</text>

  <!-- Step boxes row -->
  <!-- Box A -->
  <rect x="40" y="182" width="258" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="169" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">Step 1-A · ResFinder</text>
  <text x="169" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Detect mcr-1, sul1/2, dfrA</text>
  <text x="169" y="238" text-anchor="middle" font-size="11" fill="#6e7681">Establish resistome baseline</text>

  <!-- Box B -->
  <rect x="321" y="182" width="258" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="450" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">Step 1-B · MyDbFinder</text>
  <text x="450" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Custom DB: ISApl1 + trap clusters</text>
  <text x="450" y="238" text-anchor="middle" font-size="11" fill="#6e7681">mcr-1–sul–dfr co-occurrence</text>

  <!-- Box C -->
  <rect x="602" y="182" width="258" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="731" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">Step 1-C · R</text>
  <text x="731" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Co-occurrence analysis</text>
  <text x="731" y="238" text-anchor="middle" font-size="11" fill="#6e7681">Visualization  (dplyr · ggplot2)</text>

  <!-- Decision gate -->
  <rect x="160" y="268" width="580" height="42" rx="8" fill="#2d1c02" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">Decision gate</text>
  <text x="450" y="302" text-anchor="middle" font-size="11" fill="#92400e">Evaluate co-occurrence: literature baseline · descriptive stats · Fisher's exact test</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="310" x2="450" y2="334" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 2: Structural Analysis ── -->
  <rect x="40" y="334" width="820" height="36" rx="8" fill="#052e1c" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#4ade80">WP1 · Phase 2 — Structural Analysis  ·  Chromosomal fixation</text>

  <!-- 4 tool boxes -->
  <!-- Abricate -->
  <rect x="40" y="382" width="190" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="135" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Abricate</text>
  <text x="135" y="421" text-anchor="middle" font-size="11" fill="#6e7681">Batch screening, 127 isolates</text>
  <text x="135" y="437" text-anchor="middle" font-size="11" fill="#6e7681">CARD · VFDB cross-validation</text>

  <!-- IntegronFinder -->
  <rect x="247" y="382" width="190" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="342" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">IntegronFinder</text>
  <text x="342" y="421" text-anchor="middle" font-size="11" fill="#6e7681">Class 1 integron architecture</text>
  <text x="342" y="437" text-anchor="middle" font-size="11" fill="#6e7681">mcr-1 capture confirmation</text>

  <!-- PlasmidFinder -->
  <rect x="454" y="382" width="190" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="549" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">PlasmidFinder</text>
  <text x="549" y="421" text-anchor="middle" font-size="11" fill="#6e7681">Plasmid → chromosome shift</text>
  <text x="549" y="437" text-anchor="middle" font-size="11" fill="#6e7681">IncHI2 incompatibility groups</text>

  <!-- ISfinder -->
  <rect x="661" y="382" width="199" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="760" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">ISfinder</text>
  <text x="760" y="421" text-anchor="middle" font-size="11" fill="#6e7681">ISApl1 decay mapping</text>
  <text x="760" y="437" text-anchor="middle" font-size="11" fill="#6e7681">Era-by-era comparison</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="454" x2="450" y2="478" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 3: Phylodynamics ── -->
  <rect x="40" y="478" width="820" height="36" rx="8" fill="#1a0a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="501" text-anchor="middle" font-size="13" font-weight="600" fill="#f87171">WP2 · Phase 3 — Spatiotemporal Phylodynamics</text>

  <!-- BEAST 2 box -->
  <rect x="40" y="526" width="398" height="76" rx="7" fill="#110606" stroke="#dc2626" stroke-width="0.8"/>
  <text x="239" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#f87171">BEAST 2  (MASCOT / GLM)</text>
  <text x="239" y="566" text-anchor="middle" font-size="11" fill="#6e7681">Validate 2017 divergence point</text>
  <text x="239" y="582" text-anchor="middle" font-size="11" fill="#6e7681">Emergence timing of stabilized lineages</text>

  <rect x="462" y="526" width="398" height="76" rx="7" fill="#110606" stroke="#dc2626" stroke-width="0.8"/>
  <text x="661" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#f87171">Spatial analysis — existing departmental data</text>
  <text x="661" y="566" text-anchor="middle" font-size="11" fill="#6e7681">RESAPATH dept. data · ALEA regional data</text>
  <text x="661" y="582" text-anchor="middle" font-size="11" fill="#6e7681">(ComEDIA-Lyon: planned for PhD phase)</text>

  <!-- Arrow 3→output -->
  <line x1="450" y1="602" x2="450" y2="626" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Output ── -->
  <rect x="40" y="626" width="820" height="60" rx="8" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="651" text-anchor="middle" font-size="13" font-weight="600" fill="#22c55e">Output</text>
  <text x="450" y="672" text-anchor="middle" font-size="11" fill="#6e7681">Strengthened PhD proposal — Output: Summer 2026 · PhD start: 2027</text>

  <!-- Legend -->
  <rect x="40" y="706" width="820" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="70" y="726" font-size="11" fill="#8b949e">Status:</text>
  <rect x="112" y="715" width="10" height="10" rx="2" fill="#21262d" stroke="#8b949e" stroke-width="0.8"/>
  <text x="128" y="726" font-size="11" fill="#8b949e">Completed</text>
  <rect x="210" y="715" width="10" height="10" rx="2" fill="#1e1b4b" stroke="#4338ca" stroke-width="0.8"/>
  <text x="226" y="726" font-size="11" fill="#818cf8">Phase 1 — current focus</text>
  <rect x="374" y="715" width="10" height="10" rx="2" fill="#052e1c" stroke="#16a34a" stroke-width="0.8"/>
  <text x="390" y="726" font-size="11" fill="#4ade80">Phase 2</text>
  <rect x="448" y="715" width="10" height="10" rx="2" fill="#1a0a0a" stroke="#dc2626" stroke-width="0.8"/>
  <text x="464" y="726" font-size="11" fill="#f87171">Phase 3</text>

  <text x="70" y="752" font-size="11" fill="#8b949e">Data:</text>
  <text x="100" y="752" font-size="11" fill="#6e7681">RESAPATH · ALEA · NCBI BioProject PRJNA1166088  |  All datasets publicly available</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
