<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="820" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">Research Roadmap — The Genetic Trap: mcr-1 Stabilization in French Bovine E. coli</text>

  <!-- ── Phase 0: Completed ── -->
  <rect x="40" y="58" width="820" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#8b949e">Phase 0 — Complete ✔</text>
  <text x="450" y="99" text-anchor="middle" font-size="11" fill="#6e7681">RESAPATH longitudinal analysis · ALEA exposure analysis · Structural break (2017) · LMBK genomic proof-of-concept</text>

  <!-- Arrow 0→1 -->
  <line x1="450" y1="110" x2="450" y2="134" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 1: Complete ── -->
  <!-- Header -->
  <rect x="40" y="134" width="820" height="36" rx="8" fill="#052e1c" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#4ade80">WP1 · Phase 1 — Complete ✔  ·  PRJNA1166088 (127 isolates)</text>

  <!-- Step boxes row -->
  <!-- Box A -->
  <rect x="40" y="182" width="258" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="169" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">ResFinder (batch) ✔</text>
  <text x="169" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Detect mcr-1, sul1/2, dfrA</text>
  <text x="169" y="238" text-anchor="middle" font-size="11" fill="#6e7681">127 isolates screened</text>

  <!-- Box B -->
  <rect x="321" y="182" width="258" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="450" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Co-occurrence (base R) ✔</text>
  <text x="450" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Presence/absence matrix</text>
  <text x="450" y="238" text-anchor="middle" font-size="11" fill="#6e7681">Fisher · Binomial tests</text>

  <!-- Box C -->
  <rect x="602" y="182" width="258" height="72" rx="7" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text x="731" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Visualization ✔</text>
  <text x="731" y="222" text-anchor="middle" font-size="11" fill="#6e7681">Detection rates · Heatmap</text>
  <text x="731" y="238" text-anchor="middle" font-size="11" fill="#6e7681">RESAPATH comparison</text>

  <!-- Results gate -->
  <rect x="100" y="268" width="700" height="56" rx="8" fill="#052e1c" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Key Results (April 2026)</text>
  <text x="450" y="305" text-anchor="middle" font-size="10.5" fill="#6e7681">sul: 97.6% vs 80.4% (p &lt; 10⁻⁹) · dfrA: 69.3% vs 30.1% (p &lt; 10⁻¹⁹) · Trap: 66.9% vs 38.0% (p &lt; 10⁻¹¹)</text>
  <text x="450" y="318" text-anchor="middle" font-size="10" fill="#4ade80">All three binomial tests vs RESAPATH baseline: p &lt; 0.001 ***</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="324" x2="450" y2="348" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 2: Structural Analysis — Next ── -->
  <rect x="40" y="348" width="820" height="36" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="450" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#a5b4fc">WP1 · Phase 2 — Next (Summer 2026)  ·  Structural Analysis</text>

  <!-- 4 tool boxes -->
  <!-- Abricate -->
  <rect x="40" y="396" width="190" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="135" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">Abricate</text>
  <text x="135" y="435" text-anchor="middle" font-size="11" fill="#6e7681">Batch screening, 127 isolates</text>
  <text x="135" y="451" text-anchor="middle" font-size="11" fill="#6e7681">CARD · VFDB cross-validation</text>

  <!-- IntegronFinder -->
  <rect x="247" y="396" width="190" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="342" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">IntegronFinder</text>
  <text x="342" y="435" text-anchor="middle" font-size="11" fill="#6e7681">Class 1 integron architecture</text>
  <text x="342" y="451" text-anchor="middle" font-size="11" fill="#6e7681">mcr-1 capture confirmation</text>

  <!-- PlasmidFinder -->
  <rect x="454" y="396" width="190" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="549" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">PlasmidFinder</text>
  <text x="549" y="435" text-anchor="middle" font-size="11" fill="#6e7681">Plasmid → chromosome shift</text>
  <text x="549" y="451" text-anchor="middle" font-size="11" fill="#6e7681">IncHI2 incompatibility groups</text>

  <!-- ISfinder -->
  <rect x="661" y="396" width="199" height="72" rx="7" fill="#13111f" stroke="#4338ca" stroke-width="0.8"/>
  <text x="760" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#818cf8">ISfinder</text>
  <text x="760" y="435" text-anchor="middle" font-size="11" fill="#6e7681">ISApl1 decay mapping</text>
  <text x="760" y="451" text-anchor="middle" font-size="11" fill="#6e7681">Era-by-era comparison</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="468" x2="450" y2="492" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Phase 3: PhD Phase ── -->
  <rect x="40" y="492" width="820" height="36" rx="8" fill="#1a0a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="#f87171">WP2 · Phase 3 — Planned for PhD (2027–)</text>

  <!-- BEAST 2 box -->
  <rect x="40" y="540" width="398" height="76" rx="7" fill="#110606" stroke="#dc2626" stroke-width="0.8"/>
  <text x="239" y="562" text-anchor="middle" font-size="12" font-weight="600" fill="#f87171">BEAST 2  (MASCOT / GLM)</text>
  <text x="239" y="580" text-anchor="middle" font-size="11" fill="#6e7681">Validate 2017 divergence point</text>
  <text x="239" y="596" text-anchor="middle" font-size="11" fill="#6e7681">Emergence timing of stabilized lineages</text>

  <rect x="462" y="540" width="398" height="76" rx="7" fill="#110606" stroke="#dc2626" stroke-width="0.8"/>
  <text x="661" y="562" text-anchor="middle" font-size="12" font-weight="600" fill="#f87171">Spatial + Environmental</text>
  <text x="661" y="580" text-anchor="middle" font-size="11" fill="#6e7681">Spatial dissemination (departmental data)</text>
  <text x="661" y="596" text-anchor="middle" font-size="11" fill="#6e7681">ComEDIA-Lyon environmental data</text>

  <!-- Arrow 3→output -->
  <line x1="450" y1="616" x2="450" y2="640" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Output ── -->
  <rect x="40" y="640" width="820" height="72" rx="8" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="663" text-anchor="middle" font-size="13" font-weight="600" fill="#22c55e">Output</text>
  <text x="450" y="683" text-anchor="middle" font-size="11" fill="#6e7681">Strengthened PhD proposal: Summer 2026  ·  PhD application: Spring 2027  ·  PhD start: Autumn 2027</text>
  <text x="450" y="700" text-anchor="middle" font-size="10" fill="#4ade80">Target: ANSES Lyon — Unité Antibiorésistance et Virulence Bactériennes</text>

  <!-- Legend -->
  <rect x="40" y="732" width="820" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="70" y="752" font-size="11" fill="#8b949e">Status:</text>
  <rect x="112" y="741" width="10" height="10" rx="2" fill="#21262d" stroke="#8b949e" stroke-width="0.8"/>
  <text x="128" y="752" font-size="11" fill="#8b949e">Complete</text>
  <rect x="200" y="741" width="10" height="10" rx="2" fill="#052e1c" stroke="#16a34a" stroke-width="0.8"/>
  <text x="216" y="752" font-size="11" fill="#4ade80">Phase 1 — complete (April 2026)</text>
  <rect x="420" y="741" width="10" height="10" rx="2" fill="#1e1b4b" stroke="#4338ca" stroke-width="0.8"/>
  <text x="436" y="752" font-size="11" fill="#818cf8">Phase 2 — next (Summer 2026)</text>
  <rect x="640" y="741" width="10" height="10" rx="2" fill="#1a0a0a" stroke="#dc2626" stroke-width="0.8"/>
  <text x="656" y="752" font-size="11" fill="#f87171">Phase 3 — PhD (2027–)</text>

  <text x="70" y="788" font-size="11" fill="#8b949e">Data:</text>
  <text x="100" y="788" font-size="11" fill="#6e7681">RESAPATH · ALEA · NCBI BioProject PRJNA1166088 (127 bovine E. coli, 2011–2018, Haenni et al. 2025)  |  All publicly available</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
